name: Update Discover Cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Discover stories
        run: node scripts/fetch-feeds.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add perplexity_cache.json
          git diff --staged --quiet || git commit -m "Update Discover cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
